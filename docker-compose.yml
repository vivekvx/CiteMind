services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/data/citemind.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-citemind_chunks}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-vector}
      PAGE_INDEX_MIN_CHUNKS: ${PAGE_INDEX_MIN_CHUNKS:-8}
      RERANKER_MODE: ${RERANKER_MODE:-none}
      RERANKER_TOP_K: ${RERANKER_TOP_K:-30}
      RERANKER_FINAL_K: ${RERANKER_FINAL_K:-5}
      DOCUMENT_PARSER: ${DOCUMENT_PARSER:-pymupdf}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10000000}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-20}
    ports:
      - "8001:8001"
    volumes:
      - citemind_data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend
    ports:
      - "3001:3001"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  citemind_data:
  qdrant_data:
  ollama_data:
