services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/data/citemind.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-citemind_chunks}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-vector}
      PAGE_INDEX_MIN_CHUNKS: ${PAGE_INDEX_MIN_CHUNKS:-8}
    ports:
      - "8001:8001"
    volumes:
      - citemind_data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  citemind_data:
